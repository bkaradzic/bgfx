default_language_version:
  python: python3

exclude: |
  (?x)^(
    3rdparty/.*|
    .*\.bin\.h|
    .*\.ttf\.h$
  )

repos:
  - repo: local
    hooks:
      - id: file-format
        name: file-format
        language: python
        entry: python .github/workflows/file_format.py
        types_or: [text]
